<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin MRD - Acceso Privado</title>
    <style>
        :root { --primary: #8C1C1C; --bg: #f5f5f7; }
        
        /* Ocultar contenido por defecto */
        #admin-content { display: none; }

        body { font-family: 'Jost', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; margin-bottom: 30px; }
        h2 { color: var(--primary); margin-top: 0; text-align: center; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #621313; }

        /* Estilos de la lista de gestión */
        .post-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; gap: 10px; }
        .post-info { flex-grow: 1; }
        .post-info span { display: block; font-weight: bold; font-size: 0.9rem; }
        .post-info small { color: #666; font-size: 0.8rem; }
        .btn-delete { width: auto; padding: 8px 12px; background: #ff4444; font-size: 0.8rem; }
        .btn-delete:hover { background: #cc0000; }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }

        #error-msg { color: #8C1C1C; text-align: center; display: none; margin-top: 100px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="error-msg">
        <h1>ACCESO RESTRINGIDO</h1>
        <p>Contraseña incorrecta. Recarga la página para intentar de nuevo.</p>
    </div>

    <div id="admin-content">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0;">Nueva Noticia</h2>
                <button onclick="location.reload()" style="width: auto; padding: 5px 10px; background: #333;">Salir</button>
            </div>
            
            <input type="text" id="titulo" placeholder="Título de la publicación">
            <input type="text" id="url" placeholder="URL de la Imagen (Cloudinary/Imgur)">
            <textarea id="texto" rows="4" placeholder="Escribe el contenido aquí..."></textarea>
            <button onclick="publicar()">PUBLICAR EN EL INDEX</button>
        </div>

        <div class="card">
            <h2>Gestionar Publicaciones</h2>
            <div id="lista-publicaciones">
                <p style="text-align:center;">Cargando lista...</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // --- SEGURIDAD ---
        const CLAVE_CORRECTA = "MRD2024";

        (function verificar() {
            const intento = prompt("Ingrese la contraseña de administrador:");
            if (intento === CLAVE_CORRECTA) {
                document.getElementById('admin-content').style.display = 'block';
                iniciarApp();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        })();

        // --- LÓGICA DE LA APLICACIÓN ---
        function iniciarApp() {
            const firebaseConfig = {
                apiKey: "BG8qmwxVTS10uX8oB45l62Ta8DSfqlPrEMr7xtOd4S4ybcDT1xlnCxZQFen9fVb5yHok0FKdaEXQdOe1NRWBnSU",
                authDomain: "mrd-store-a1316.firebaseapp.com",
                databaseURL: "https://mrd-store-a1316-default-rtdb.firebaseio.com",
                projectId: "mrd-store-a1316"
            };

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            // Función para Publicar
            window.publicar = function() {
                const t = document.getElementById('titulo').value;
                const u = document.getElementById('url').value;
                const x = document.getElementById('texto').value;

                if (!t || !u || !x) return alert("Por favor, completa todos los campos.");

                db.ref('articulos').push({
                    title: t,
                    image: u,
                    content: x,
                    date: new Date().toLocaleDateString('es-DO', { day: 'numeric', month: 'short' })
                }).then(() => {
                    alert("¡Publicación exitosa!");
                    document.getElementById('titulo').value = "";
                    document.getElementById('url').value = "";
                    document.getElementById('texto').value = "";
                });
            };

            // Función para Listar y Borrar
            db.ref('articulos').on('value', (snapshot) => {
                const container = document.getElementById('lista-publicaciones');
                container.innerHTML = "";
                const data = snapshot.val();

                if (data) {
                    Object.keys(data).reverse().forEach(key => {
                        const post = data[key];
                        container.innerHTML += `
                            <div class="post-item">
                                <img src="${post.image}" class="img-preview">
                                <div class="post-info">
                                    <span>${post.title}</span>
                                    <small>${post.date}</small>
                                </div>
                                <button class="btn-delete" onclick="borrarPost('${key}')">Borrar</button>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = "<p style='text-align:center;'>No hay publicaciones activas.</p>";
                }
            });

            window.borrarPost = function(id) {
                if (confirm("¿Estás seguro de eliminar esta publicación de forma permanente?")) {
                    db.ref('articulos/' + id).remove();
                }
            };
        }
    </script>
</body>
</html>
